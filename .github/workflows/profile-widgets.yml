name: Profile Widgets

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:          # allow manual trigger from Actions tab

jobs:

  # ─────────────────────────────────────────────────────────────────
  # JOB 1: Contribution Snake
  # Output: branch "output" → github-snake.svg + github-snake-dark.svg
  # README embed:
  #   src="https://raw.githubusercontent.com/AI-Ahmed/AI-Ahmed/output/github-snake.svg"
  # ─────────────────────────────────────────────────────────────────
  snake:
    name: 🐍 Contribution Snake
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: AI-Ahmed
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  # ─────────────────────────────────────────────────────────────────
  # JOB 2: 3D Contribution Globe
  # No custom SETTING_JSON — avoids foregroundColor parsing bug in 0.7.1.
  # Output: main branch → profile-3d-contrib/profile-night-rainbow.svg
  # README embed:
  #   src="https://raw.githubusercontent.com/AI-Ahmed/AI-Ahmed/main/profile-3d-contrib/profile-night-rainbow.svg"
  # ─────────────────────────────────────────────────────────────────
  globe:
    name: 🌐 3D Contribution Globe
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: AI-Ahmed

      - name: Commit 3D graph
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile-3d-contrib/
          git commit -m "chore: update 3D contribution graph [skip ci]" || exit 0
          git push


  # ─────────────────────────────────────────────────────────────────
  # JOB 3: Trophy SVG (self-hosted via Deno, no Vercel dependency)
  # Clones the official ryo-ma/github-profile-trophy repo and runs
  # its render_svg.ts script directly with Deno.
  # Output: main branch → assets/trophy.svg
  # README embed:
  #   src="https://raw.githubusercontent.com/AI-Ahmed/AI-Ahmed/main/assets/trophy.svg"
  # ─────────────────────────────────────────────────────────────────
  trophy:
    name: 🏆 Trophy SVG
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Clone trophy renderer
        run: |
          git clone --depth 1 https://github.com/ryo-ma/github-profile-trophy.git /tmp/trophy

      - name: Generate trophy SVG
        env:
          # render_svg.ts reads TROPHY_TOKEN — not GITHUB_TOKEN
          TROPHY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p assets
          cd /tmp/trophy
          deno run \
            --allow-net \
            --allow-env \
            --allow-read \
            --allow-write \
            ./render_svg.ts \
            AI-Ahmed \
            ${{ github.workspace }}/assets \
            tokyonight
          ls -la ${{ github.workspace }}/assets/

      - name: Commit trophy SVG
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/trophy.svg
          git diff --staged --quiet || git commit -m "chore: update trophy SVG [skip ci]"
          git push
